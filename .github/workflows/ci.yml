name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-coverage:
    runs-on: macos-latest
    env:
      MIN_COVERAGE: "35"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Pick iOS Simulator
        run: |
          DEVICE_NAME=$(python3 - <<'PY'
          import subprocess, re, sys
          r = subprocess.run(
              ["xcodebuild", "-showdestinations", "-scheme", "KnowledgeBaseApp"],
              capture_output=True,
              text=True,
              cwd=".",
          )
          if r.returncode != 0:
              print("iPhone 15", end="")
              sys.exit(0)
          for line in r.stdout.splitlines():
              if "platform:iOS Simulator" in line and "iPhone" in line:
                  m = re.search(r"name:([^,}]+)", line)
                  if m:
                      print(m.group(1).strip(), end="")
                      sys.exit(0)
          print("iPhone 15", end="")
          PY
          )
          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "SCAN_DEVICE=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "Using simulator: $DEVICE_NAME"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Run tests (Fastlane scan + coverage gate)
        run: bundle exec fastlane test
